    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Play Console says my package name is not available — what do I do?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Play Console will only auto-register a package name that is not already known to Android. If the name is taken, you have to register it in Android Developer Console by uploading a release APK that contains assets/adi-registration.properties with the snippet the console gives you, signed with the corresponding private signing key. This tool builds that APK in your browser."
            }
          },
          {
            "@type": "Question",
            "name": "Does this also work for adding additional keys to a registered package name?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The 'add a key' flow in Android Developer Console uses the same adi-registration.properties proof of private key ownership."
            }
          },
          {
            "@type": "Question",
            "name": "Is my keystore or password uploaded anywhere?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The tool runs entirely client-side in your browser. Your APK, keystore, and password never leave your device."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need Android Studio, Gradle, jarsigner, apksigner, or keytool?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The whole pipeline runs in the browser."
            }
          },
          {
            "@type": "Question",
            "name": "Which keystore formats are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "PKCS#12 keystores (.p12, .pfx) and the .jks / .keystore formats Android uses by default."
            }
          }
        ]
      }
    </script>
